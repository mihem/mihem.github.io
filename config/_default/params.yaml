# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance (HugoBlox v2 theme engine - the legacy 'appearance' key is ignored by blox v0.12+)
hugoblox:
  theme:
    # 'light', 'dark', or 'system' (follows OS preference; navbar toggle overrides per session)
    mode: system
    # Built-in 'default' pack for light mode, custom 'black' pack (pure-black bg) for dark mode
    pack:
      light: default
      dark: black
    # Brand color (restores the previous emerald accent in both modes)
    colors:
      primary: emerald

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'The highly-customizable Hugo Academic theme powered by Hugo Blox Builder. Easily create your personal academic website.'
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: "MHeming"

# Site footer
footer:
  copyright:
    notice: '© {year} Michael Heming. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
